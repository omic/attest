name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev,mcp]"

      - name: Build Rust extension
        run: |
          source .venv/bin/activate
          pip install maturin
          cd rust/attest-py && maturin develop --release

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest tests/integration/ -v --tb=short

      - name: Run golden vector tests
        run: |
          source .venv/bin/activate
          pytest tests/cross_lang/ -v --tb=short

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/smoke-venv
          source /tmp/smoke-venv/bin/activate
          pip install maturin
          cd rust/attest-py && maturin build --release
          pip install ../../rust/target/wheels/attest_py-*.whl
          python -c "import attest_rust; print('attest_rust import OK')"
          pip install -e ../..
          python -c "from attestdb import open; db = open(':memory:'); db.close(); print('attestdb smoke test OK')"

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run Rust tests
        working-directory: rust
        run: cargo test --all

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check attestdb/ || echo "::warning::Lint issues found (non-blocking)"
