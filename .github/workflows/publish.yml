name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write  # trusted publishing
  attestations: write
  contents: read

jobs:
  # --- Build the pure-Python attestdb package ---
  build-python:
    name: Build attestdb sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/

  # --- Build attest-py Rust wheels for each platform ---
  build-rust:
    name: Build attest-py (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up QEMU (for aarch64 cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/attest-py
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-rust-${{ matrix.target }}
          path: rust/attest-py/dist/

  # --- Publish everything to PyPI from a single Linux runner ---
  publish-python:
    name: Publish attestdb to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-rust:
    name: Publish attest-py to PyPI
    needs: build-rust
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-rust-*
          path: dist/
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
